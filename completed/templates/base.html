<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}お問い合わせ管理{% endblock %}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Google Sans', 'Noto Sans JP', -apple-system, sans-serif;
      background: #f8f9fa;
      color: #202124;
      line-height: 1.6;
    }
    .navbar {
      background: #1a73e8;
      color: white;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .navbar h1 { font-size: 18px; font-weight: 500; }
    .navbar a { color: rgba(255,255,255,0.9); text-decoration: none; font-size: 14px; }
    .navbar a:hover { color: white; }
    .container { max-width: 960px; margin: 0 auto; padding: 24px; }

    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-open { background: #e8f0fe; color: #1a73e8; }
    .badge-in_progress { background: #fef7e0; color: #e37400; }
    .badge-closed { background: #e6f4ea; color: #137333; }
    .badge-high { background: #fce8e6; color: #c5221f; }
    .badge-medium { background: #fef7e0; color: #e37400; }
    .badge-low { background: #e6f4ea; color: #137333; }

    .card {
      background: white;
      border: 1px solid #dadce0;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }

    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #e8eaed; font-size: 14px; }
    th { background: #f8f9fa; font-weight: 600; color: #5f6368; font-size: 13px; }
    tr:hover { background: #f8f9fa; }

    a.link { color: #1a73e8; text-decoration: none; }
    a.link:hover { text-decoration: underline; }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .summary-card {
      background: white;
      border: 1px solid #dadce0;
      border-radius: 8px;
      padding: 16px;
      text-align: center;
    }
    .summary-card .number { font-size: 28px; font-weight: 500; }
    .summary-card .label { font-size: 12px; color: #5f6368; margin-top: 4px; }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 16px 0;
    }
    .detail-item { font-size: 14px; }
    .detail-item .label { font-size: 12px; color: #5f6368; margin-bottom: 2px; }

    .back-link { display: inline-block; margin-bottom: 16px; color: #1a73e8; text-decoration: none; font-size: 14px; }
    .back-link:hover { text-decoration: underline; }

    .error-message {
      text-align: center;
      padding: 48px;
      color: #5f6368;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <h1>お問い合わせ管理</h1>
    <a href="/">チケット一覧</a>
  </nav>
  <div class="container">
    {% if error %}
      <div class="error-message">{{ error }}</div>
    {% else %}
      {% block content %}{% endblock %}
    {% endif %}
  </div>
</body>
</html>
